name: Build and publish arm64 image to GitHub Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      GOST_VERSION:
        description: "Version of gost. If empty, the latest version will be used."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get gost version
        id: get-gost-version
        run: |
          if [ -z "${{ github.event.inputs.GOST_VERSION }}" ]; then
            echo "GOST_VERSION=$(curl -H 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' -s https://api.github.com/repos/ginuerzh/gost/releases/latest | jq -r '.tag_name' | cut -c 2-)" >> "$GITHUB_OUTPUT"
          else
            echo "GOST_VERSION=${{ github.event.inputs.GOST_VERSION }}" >> "$GITHUB_OUTPUT"
          fi

      # gost version must be <number>.<number>.<number>
      - name: Verify gost version
        run: |
          if [[ ! "${{ steps.get-gost-version.outputs.GOST_VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid gost version: ${{ steps.get-gost-version.outputs.GOST_VERSION }}"
            exit 1
          fi

      - name: Get WARP client version
        id: get-warp-client-version
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          echo "WARP_VERSION=$(apt-cache show cloudflare-warp | grep '^Version:' | awk '{print $2}' | sed 's/-[0-9]*$//' | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Compute release metadata
        id: meta
        run: |
          WARP_VERSION="${{ steps.get-warp-client-version.outputs.WARP_VERSION }}"
          GOST_VERSION="${{ steps.get-gost-version.outputs.GOST_VERSION }}"
          # On tag push, github.ref_name is the git tag (e.g. "iso-1").
          # On manual workflow_dispatch from a branch, it's the branch name (used only for ad-hoc test builds).
          GIT_REF="${{ github.ref_name }}"
          TAG="${GIT_REF}-v${WARP_VERSION}-${GOST_VERSION}"
          IMAGE_TAG="warp-docker:${GIT_REF}-${WARP_VERSION}-${GOST_VERSION}"
          ARTIFACT="warp-docker-arm64-${GIT_REF}-${WARP_VERSION}-${GOST_VERSION}.tar.gz"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Build image (arm64, load to local docker)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          load: true
          build-args: |
            GOST_VERSION=${{ steps.get-gost-version.outputs.GOST_VERSION }}
            WARP_VERSION=${{ steps.get-warp-client-version.outputs.WARP_VERSION }}
            COMMIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.IMAGE_TAG }}

      - name: Save image to tar.gz
        run: |
          docker save "${{ steps.meta.outputs.IMAGE_TAG }}" | gzip > "${{ steps.meta.outputs.ARTIFACT }}"
          ls -lh "${{ steps.meta.outputs.ARTIFACT }}"

      - name: Create GitHub Release and upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.TAG }}
          name: ${{ steps.meta.outputs.TAG }}
          body: |
            Git tag: `${{ github.ref_name }}`
            Cloudflare WARP: `${{ steps.get-warp-client-version.outputs.WARP_VERSION }}`
            gost: `${{ steps.get-gost-version.outputs.GOST_VERSION }}`
            Commit: `${{ github.sha }}`
            Architecture: `linux/arm64`

            Load with:
            ```
            gunzip -c ${{ steps.meta.outputs.ARTIFACT }} | docker load
            ```
          files: ${{ steps.meta.outputs.ARTIFACT }}
          fail_on_unmatched_files: true
          make_latest: "true"
