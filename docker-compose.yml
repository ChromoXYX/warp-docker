services:
  warp:
    image: caomingjun/warp
    container_name: warp
    restart: always
    # add removed rule back (https://github.com/opencontainers/runc/pull/3468)
    device_cgroup_rules:
      - 'c 10:200 rwm'
    ports:
      - "127.0.0.1:1080:1080"
      - "127.0.0.1:${NGINX_LISTEN_PORT:-8443}:${NGINX_LISTEN_PORT:-8443}"
    environment:
      - WARP_SLEEP=2
      # - WARP_LICENSE_KEY= # optional
      # - WARP_ENABLE_NAT=1 # enable nat
      # === LAN / loopback isolation (default on) ===
      - WARP_ISOLATE_LAN=1
      # - WARP_ISOLATE_ALLOW_CIDR=192.168.99.10/32,10.20.30.0/24
      # === Startup probes (any failure aborts container) ===
      # - WARP_ISOLATE_TEST_REACH=1.1.1.1:443
      # - WARP_ISOLATE_TEST_TCP=192.168.1.1:80,10.0.0.1:22
      # - WARP_ISOLATE_TEST_PING=192.168.1.1
    cap_add:
      # Docker already have them, these are for podman users
      - MKNOD
      - AUDIT_WRITE
      # additional required cap for warp, both for podman and docker
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
      # uncomment for nat
      # - net.ipv4.ip_forward=1
      # - net.ipv6.conf.all.forwarding=1
      # - net.ipv6.conf.all.accept_ra=2
    volumes:
      - ./data:/var/lib/cloudflare-warp

  nginx:
    image: nginx:alpine
    container_name: warp-nginx
    restart: always
    network_mode: "service:warp"
    depends_on:
      - warp
    environment:
      - NGINX_LISTEN_PORT=${NGINX_LISTEN_PORT:-8443}
      - NGINX_UPSTREAM=${NGINX_UPSTREAM:?must set NGINX_UPSTREAM=host:port in .env}
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    command: >
      /bin/sh -c "envsubst '$$NGINX_LISTEN_PORT $$NGINX_UPSTREAM'
      < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && exec nginx -g 'daemon off;'"
